<style>
  :root{--bg:#F7F5F0;--ink:#2b2b2b;--muted:#857f78;--line:rgba(0,0,0,.1)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:32px 24px 64px}
  header h1{font-size:23px;font-weight:600;margin:0 0 6px}
  header p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:24px}
  .card{background:#fff;border:.5px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin:0}
  .hd{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .n{width:28px;height:28px;flex:0 0 28px;border-radius:8px;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
  .hd h2{font-size:15px;font-weight:600;margin:0}
  .hd p{font-size:11.5px;color:var(--muted);margin:1px 0 0}
  .frame{border-radius:12px;overflow:hidden;border:.5px solid var(--line);background:#FFFEFB;aspect-ratio:320/380}
  .frame svg{display:block;width:100%;height:100%}
  .na{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb}
  footer{margin-top:36px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}.wrap{padding:20px 14px}}
</style>
</head>
