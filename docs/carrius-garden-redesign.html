<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carrius 花園頁改版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{--accent:#AB9FF2;--accentSoft:#E2DFFE;--plum:#3C315B;--plumDeep:#2C2250;--cream:#FDFBF7;--surface:#fff;
    --info:#6CA0FB;--infoS:#E4EEFE;--coral:#E89A7E;--coralS:#FBEBE3;--garden:#7FC79A;--gardenS:#E2F3E8;
    --pink:#FFB7D5;--pinkS:#FFE6F0;--lemon:#F1FF52;--sun:#FFC368;--text2:#86848D;--text3:#A6A4AD;--border:rgba(60,49,91,.10);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{background:#EDEAF3;font-family:'Noto Sans TC',sans-serif;color:var(--plum);padding:34px;display:flex;gap:40px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .cap{font-size:13px;font-weight:700;color:#6b6580;margin-bottom:10px;max-width:330px;line-height:1.5;}
  .phone{position:relative;width:340px;height:736px;background:var(--cream);border-radius:44px;border:9px solid #15121f;overflow:hidden;}
  .status{display:flex;justify-content:space-between;align-items:center;padding:15px 26px 6px;font-size:13px;font-weight:700;}
  .scroll{height:100%;overflow:hidden;}
  /* 頂部連續簽到 */
  .streak{margin:4px 18px 0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:13px 15px;}
  .streakTop{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
  .flame{width:30px;height:30px;border-radius:10px;background:#FFE7C2;display:flex;align-items:center;justify-content:center;color:#E08A2B;font-size:17px;}
  .streakN{font-size:15px;font-weight:900;}
  .streakN b{font-family:'Nunito';color:#E08A2B;}
  .streakSub{font-size:11px;color:var(--text2);margin-left:auto;font-weight:600;}
  .week{display:flex;justify-content:space-between;}
  .day{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;color:var(--text3);font-weight:700;width:34px;}
  .dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:#F0EEF6;color:var(--text3);}
  .dot.done{background:var(--accent);color:#fff;}
  .dot.today{background:#fff;border:2px solid var(--accent);color:var(--accent);}
  /* 主場景：曲線暖場 + 樹（無框） */
  .scene{position:relative;height:298px;margin-top:6px;overflow:hidden;}
  .scene svg.bg{position:absolute;inset:0;width:100%;height:100%;}
  .treewrap{position:absolute;left:0;right:0;top:34px;display:flex;justify-content:center;}
  .sceneCap{position:absolute;left:0;right:0;bottom:14px;text-align:center;}
  .sceneCap .t{font-size:18px;font-weight:900;}
  .sceneCap .s{font-size:12px;color:var(--text2);font-weight:600;margin-top:3px;}
  .sunpill{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.7);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:900;color:#E08A2B;display:flex;align-items:center;gap:4px;}
  /* 快樂小項目 橫向滑動圖卡 */
  .hsec{display:flex;align-items:baseline;justify-content:space-between;margin:16px 18px 10px;}
  .hsec .t{font-size:16px;font-weight:900;}
  .hsec .s{font-size:11.5px;color:var(--text2);font-weight:600;}
  .rail{display:flex;gap:12px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none;}
  .rail::-webkit-scrollbar{display:none;}
  .hcard{flex:none;width:134px;border-radius:22px;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .hart{height:74px;border-radius:16px;display:flex;align-items:center;justify-content:center;}
  .hart .ti{font-size:34px;}
  .hcard .ht{font-size:14px;font-weight:900;}
  .hcard .hs{font-size:10.5px;color:var(--text2);font-weight:600;margin-top:-3px;}
  .sunchip{align-self:flex-start;background:rgba(255,255,255,.65);border-radius:999px;padding:2px 9px;font-size:10.5px;font-weight:900;color:#E08A2B;margin-top:2px;}
  /* 浮起毛玻璃 tab bar（花園 active） */
  .tabwrap{position:absolute;left:16px;right:16px;bottom:14px;}
  .tabbar{position:relative;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-radius:999px;background:rgba(253,251,247,.72);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--border);box-shadow:0 9px 22px rgba(40,34,80,.16);}
  .tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8.5px;color:var(--text3);font-weight:900;width:42px;}
  .tab.on{color:var(--accent);}
  .tab .ti{font-size:21px;line-height:1;}
  .tab u{display:block;width:12px;height:3px;border-radius:999px;background:transparent;margin-top:1px;}
  .tab.on u{background:var(--accent);}
  .fab{position:absolute;right:18px;bottom:82px;width:45px;height:45px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--plumDeep);box-shadow:0 8px 18px rgba(171,159,242,.6);}
  .fab .ti{font-size:22px;}
</style>
</head>
<body>

<div>
<div class="cap">花園頁改版：① 頂部連續簽到　② 樹當吉祥物的曲線暖場景（無框、有背景曲線）　③ 快樂小項目＝橫向滑動圖卡（仿 Alan）。不再是一排作業框。</div>
<div class="phone"><div class="scroll">
  <div class="status"><span style="font-family:Nunito">9:41</span><span>● ● ●</span></div>

  <!-- 連續簽到 -->
  <div class="streak">
    <div class="streakTop">
      <div class="flame"><i class="ti ti-flame"></i></div>
      <div class="streakN">連續 <b>12</b> 天照顧自己</div>
      <div class="streakSub">本週 5 / 7</div>
    </div>
    <div class="week">
      <div class="day">一<div class="dot done"><i class="ti ti-check"></i></div></div>
      <div class="day">二<div class="dot done"><i class="ti ti-check"></i></div></div>
      <div class="day">三<div class="dot done"><i class="ti ti-check"></i></div></div>
      <div class="day">四<div class="dot done"><i class="ti ti-check"></i></div></div>
      <div class="day">五<div class="dot today">今</div></div>
      <div class="day">六<div class="dot"></div></div>
      <div class="day">日<div class="dot"></div></div>
    </div>
  </div>

  <!-- 主場景：曲線 + 樹 -->
  <div class="scene">
    <svg class="bg" viewBox="0 0 340 298" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F3ECFF"/><stop offset="0.55" stop-color="#FBF4EC"/><stop offset="1" stop-color="#FDFBF7"/>
        </linearGradient>
      </defs>
      <rect width="340" height="298" fill="url(#sky)"/>
      <circle cx="170" cy="120" r="120" fill="#FFEFD6" opacity="0.7"/>
      <circle cx="170" cy="120" r="84" fill="#FFE3B8" opacity="0.55"/>
      <path d="M0 250 Q120 224 200 244 T340 240 V298 H0 Z" fill="#EAF3EA"/>
      <path d="M0 268 Q150 246 260 264 T340 262 V298 H0 Z" fill="#DCEEDF"/>
      <circle cx="64" cy="78" r="3.5" fill="#C9B7F2"/><circle cx="280" cy="62" r="4" fill="#F3C7DC"/><circle cx="300" cy="150" r="3" fill="#C9B7F2"/>
    </svg>
    <div class="sunpill"><i class="ti ti-sun" style="font-size:13px"></i> 124</div>
    <div class="treewrap">
      <svg width="180" height="210" viewBox="0 0 180 210">
        <path d="M90 200 L90 120" stroke="#3C315B" stroke-width="9" stroke-linecap="round"/>
        <path d="M90 150 Q66 138 50 140" stroke="#3C315B" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M90 134 Q116 122 132 126" stroke="#3C315B" stroke-width="6" fill="none" stroke-linecap="round"/>
        <ellipse cx="90" cy="78" rx="62" ry="46" fill="#7FC79A"/>
        <ellipse cx="104" cy="64" rx="30" ry="20" fill="#A7DCB9"/>
        <circle cx="62" cy="74" r="3.5" fill="#fff"/><circle cx="112" cy="58" r="3.5" fill="#fff"/><circle cx="92" cy="92" r="3.5" fill="#fff"/>
        <path d="M58 200 Q90 208 122 200" stroke="#3C315B" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <g stroke="#AB9FF2" stroke-width="2.4" stroke-linecap="round"><line x1="36" y1="40" x2="36" y2="30"/><line x1="31" y1="35" x2="41" y2="35"/></g>
        <g stroke="#AB9FF2" stroke-width="2.4" stroke-linecap="round"><line x1="150" y1="96" x2="150" y2="88"/><line x1="146" y1="92" x2="154" y2="92"/></g>
      </svg>
    </div>
    <div class="sceneCap">
      <div class="t">你的茶樹，長得正好</div>
      <div class="s">茁壯期 · 再 76 ☀️ 就長成大樹</div>
    </div>
  </div>

  <!-- 快樂小項目 橫向滑動 -->
  <div class="hsec"><div class="t">今天，照顧一下自己</div><div class="s">滑看看 ›</div></div>
  <div class="rail">
    <div class="hcard" style="background:var(--infoS)"><div class="hart" style="background:#D3E5FC"><i class="ti ti-wind" style="color:#3F7BC4"></i></div><div class="ht">呼吸練習</div><div class="hs">3 分鐘，慢慢來</div><div class="sunchip">+2 ☀️</div></div>
    <div class="hcard" style="background:var(--pinkS)"><div class="hart" style="background:#FBD4E4"><i class="ti ti-heart" style="color:#C75E8A"></i></div><div class="ht">感恩日記</div><div class="hs">寫一件小事</div><div class="sunchip">+2 ☀️</div></div>
    <div class="hcard" style="background:var(--gardenS)"><div class="hart" style="background:#C8E9D2"><i class="ti ti-stretching" style="color:#3F8C5E"></i></div><div class="ht">微運動</div><div class="hs">頸部伸展一組</div><div class="sunchip">+3 ☀️</div></div>
    <div class="hcard" style="background:var(--coralS)"><div class="hart" style="background:#F6D5C5"><i class="ti ti-mood-smile" style="color:#C26A45"></i></div><div class="ht">小挑戰</div><div class="hs">微辣 · 跟人微笑</div><div class="sunchip">+3 ☀️</div></div>
    <div class="hcard" style="background:var(--accentSoft)"><div class="hart" style="background:#D6CFF6"><i class="ti ti-cards" style="color:#6B5FC0"></i></div><div class="ht">心情小卡</div><div class="hs">今天的一句話</div><div class="sunchip">+1 ☀️</div></div>
  </div>

  <div class="tabwrap"><div class="tabbar">
    <div class="tab"><i class="ti ti-home"></i>首頁<u></u></div>
    <div class="tab"><i class="ti ti-calendar-month"></i>行事曆<u></u></div>
    <div class="tab"><i class="ti ti-file-text"></i>文件<u></u></div>
    <div class="tab on"><i class="ti ti-plant-2"></i>花園<u></u></div>
    <div class="tab"><i class="ti ti-user"></i>設定<u></u></div>
  </div></div>
  <div class="fab"><i class="ti ti-plus"></i></div>
</div></div>
</div>

</body>
</html>
